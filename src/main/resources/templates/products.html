<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="layout1">

<head>
    <meta charset="UTF-8">
    <title>Products</title>
</head>
<body>
<div layout:fragment="content1">
  <div class="p-3" sec:authorize="hasRole('ADMIN')">
    <a class="btn btn-primary" th:href="@{/admin/newProduct}">New Product</a>
  </div>
  <table class="table ">
    <thead>
    <th>ID</th>
    <th>Nama</th>
    <th>Price</th>
    <th>Quantity</th>
    <th>Action</th>
    </thead>
    <tbody>
    <tr th:each="p:${productList}">
      <td th:text="${p.id}"></td>
      <td th:text="${p.name}"></td>
      <td th:text="${p.price}"></td>
      <td th:text="${p.quantity}"></td>
      <td>
      <a class="btn btn-danger" onclick="return confirm('Voulez-vous supprimer ?')" th:text="Delete"
         th:href="@{/admin/delete(id=${p.id})}" sec:authorize="hasRole('ADMIN')"></a>
    </td>
    </tr>
    </tbody>
  </table>

</div>

</body>
</html>
